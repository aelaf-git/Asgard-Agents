services:
  python-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    env_file: ./python_service/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./python_service/uploads:/app/uploads

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - PYTHON_API_URL=http://python-service:8000
    depends_on:
      - python-service

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
